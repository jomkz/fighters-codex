name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.preset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: gcc
            os: ubuntu-latest
          - preset: clang
            os: ubuntu-latest
          # Whole-program ASan/UBSan (incl. Catch2); UBSAN_OPTIONS comes from
          # the test preset. If this leg ever fails with shadow-memory errors,
          # the runner image's ASLR entropy is the usual suspect — add a
          # `sudo sysctl vm.mmap_rnd_bits=28` step before the tests.
          - preset: asan-ubsan
            os: ubuntu-latest
          - preset: msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure
        # msvc uses the runner's default Visual Studio generator — nothing
        # pinned, because the image's default VS moves (VS 17 2022 is gone
        # from windows-latest as of mid-2026)
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}

  docs:
    name: docs-status
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Spec front-matter, template conformance, encoding/link hygiene, and
      # STATUS.md currency (docs/spec-authoring.md). Stdlib-only — the
      # runner's system python3 is all it needs.
      - name: Checker self-test
        run: python3 tools/check_status.py --self-test

      - name: Check docs and status matrix
        run: python3 tools/check_status.py --check

  macos:
    name: macos (informational)
    runs-on: macos-latest
    # Informational only — macOS is unsupported (see docs/development.md).
    # continue-on-error at job level: a failure here never fails the
    # workflow; open the job's logs for its real status.
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure
        # Deliberately no preset: presets stay Linux/Windows-only by policy
        run: cmake -B build-macos -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build-macos

      - name: Test
        run: ctest --test-dir build-macos --output-on-failure --no-tests=error

  fuzz:
    name: fuzz-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure
        run: cmake --preset fuzz

      - name: Build harnesses
        run: cmake --build --preset fuzz --target fuzzers

      - name: Smoke run
        # Each harness fuzzes for 60s from its committed seed corpus
        # (fuzz/CMakeLists.txt registers one ctest per harness, label "fuzz")
        run: ctest --preset fuzz

      - name: Upload findings
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-findings
          path: |
            build/fuzz/fuzz/*-work/crash-*
            build/fuzz/fuzz/*-work/oom-*
            build/fuzz/fuzz/*-work/timeout-*
            build/fuzz/fuzz/*-work/leak-*
          if-no-files-found: ignore

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure
        run: cmake --preset coverage

      - name: Build
        run: cmake --build --preset coverage

      - name: Test
        run: ctest --preset coverage

      - name: Report
        # Search only the first-party object dirs — scanning all of
        # build/coverage feeds gcovr the FetchContent'd Catch2 .gcda files,
        # whose sources it cannot resolve (fatal in current gcovr)
        run: |
          pipx install gcovr
          mkdir -p coverage-report
          gcovr -r . build/coverage/lib build/coverage/cli \
                -f 'lib/' -f 'cli/' -e 'lib/vendor/' \
                --txt coverage-report/summary.txt \
                --html-details coverage-report/coverage.html \
                --print-summary
          { echo '### Line coverage — lib/ + cli/'; echo '```'; \
            cat coverage-report/summary.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce coverage floor
        # Ratchet, not target: 23% is a couple of points under the measured
        # baseline (25.7% pre-Phase-4). Epic #50 raises it; never lower it.
        run: |
          gcovr -r . build/coverage/lib build/coverage/cli \
                -f 'lib/' -f 'cli/' -e 'lib/vendor/' \
                --fail-under-line 23 > /dev/null

      - name: Upload HTML report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage-report/
