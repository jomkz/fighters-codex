name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.preset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: gcc
            os: ubuntu-latest
          - preset: clang
            os: ubuntu-latest
          # Whole-program ASan/UBSan (incl. Catch2); UBSAN_OPTIONS comes from
          # the test preset. If this leg ever fails with shadow-memory errors,
          # the runner image's ASLR entropy is the usual suspect — add a
          # `sudo sysctl vm.mmap_rnd_bits=28` step before the tests.
          - preset: asan-ubsan
            os: ubuntu-latest
          - preset: msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install GUI build deps
        # Ubuntu runners ship no libsdl3-dev, so the gui always exercises the
        # pinned FetchContent SDL3 (ADR-0001), which needs the X11/Wayland
        # dev headers at compile time; xvfb + llvmpipe give gui_smoke a
        # GL 3.3 context.
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxfixes-dev libxss-dev libxtst-dev libxkbcommon-dev libwayland-dev libdecor-0-dev \
            libegl1-mesa-dev libgl1-mesa-dev libdbus-1-dev \
            xvfb libgl1-mesa-dri

      - name: Configure
        # msvc uses the runner's default Visual Studio generator — nothing
        # pinned, because the image's default VS moves (VS 17 2022 is gone
        # from windows-latest as of mid-2026)
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test (Linux)
        # xvfb-run provides the X server gui_smoke renders against
        if: runner.os == 'Linux'
        run: xvfb-run -a ctest --preset ${{ matrix.preset }}

      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: ctest --preset ${{ matrix.preset }}

  docs:
    name: docs-status
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Spec front-matter, template conformance, encoding/link hygiene, and
      # STATUS.md currency (docs/spec-authoring.md). Stdlib-only — the
      # runner's system python3 is all it needs.
      - name: Checker self-test
        run: python3 tools/check_status.py --self-test

      - name: Check docs and status matrix
        run: python3 tools/check_status.py --check

  macos:
    name: macos (informational)
    runs-on: macos-latest
    # Informational only — macOS is unsupported (see docs/development.md).
    # continue-on-error at job level: a failure here never fails the
    # workflow; open the job's logs for its real status.
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure
        # Deliberately no preset: presets stay Linux/Windows-only by policy.
        # FX_BUILD_GUI=OFF — this job sanity-checks fx_lib/cli portability;
        # FetchContent would otherwise compile all of SDL3 here for nothing.
        run: cmake -B build-macos -DCMAKE_BUILD_TYPE=Debug -DFX_BUILD_GUI=OFF

      - name: Build
        run: cmake --build build-macos

      - name: Test
        run: ctest --test-dir build-macos --output-on-failure --no-tests=error

  # Gate + fan-out for the fuzz smoke. Decides whether the smoke needs to run
  # (skip docs- or workflow-only PRs) and enumerates the harnesses so each runs
  # as its own parallel job below — wall-clock stays flat as batches grow.
  fuzz-changes:
    name: fuzz-changes
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.filter.outputs.run }}
      harnesses: ${{ steps.filter.outputs.harnesses }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - id: filter
        run: |
          # Pushes to main always run; PRs run only when fuzzable sources, the
          # build config, or this workflow changed.
          run=true
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base='${{ github.event.pull_request.base.sha }}'
            if git diff --name-only "$base"...HEAD \
                 | grep -qE '^(lib/|fuzz/|CMakeLists\.txt|CMakePresets\.json|\.github/workflows/ci\.yml)'; then
              run=true
            else
              run=false
            fi
          fi
          harnesses=$(ls fuzz/fuzz_*.cpp | xargs -n1 basename | sed 's/\.cpp$//' \
                        | jq -R . | jq -sc .)
          echo "run=$run"          >> "$GITHUB_OUTPUT"
          echo "harnesses=$harnesses" >> "$GITHUB_OUTPUT"
          echo "run=$run harnesses=$harnesses"

  # One 60-second libFuzzer smoke per harness, in parallel. Each job builds
  # only its own target and runs that harness's ctest over the committed corpus.
  fuzz-run:
    name: fuzz-run (${{ matrix.harness }})
    needs: fuzz-changes
    if: needs.fuzz-changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        harness: ${{ fromJson(needs.fuzz-changes.outputs.harnesses) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure
        run: cmake --preset fuzz

      - name: Build ${{ matrix.harness }}
        run: cmake --build --preset fuzz --target ${{ matrix.harness }}

      - name: Smoke run (60s)
        run: ctest --preset fuzz -R "^fuzz_smoke_${{ matrix.harness }}$" --output-on-failure

      - name: Upload findings
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-findings-${{ matrix.harness }}
          path: |
            build/fuzz/fuzz/${{ matrix.harness }}-work/crash-*
            build/fuzz/fuzz/${{ matrix.harness }}-work/oom-*
            build/fuzz/fuzz/${{ matrix.harness }}-work/timeout-*
            build/fuzz/fuzz/${{ matrix.harness }}-work/leak-*
          if-no-files-found: ignore

  # Stable required-check name: green when the matrix passed or was skipped
  # (docs-only PR), red if any harness smoke failed.
  fuzz-smoke:
    name: fuzz-smoke
    needs: [fuzz-changes, fuzz-run]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate
        run: |
          if [ "${{ needs.fuzz-changes.result }}" != "success" ]; then
            echo "fuzz-changes did not succeed."; exit 1
          fi
          if [ "${{ needs.fuzz-changes.outputs.run }}" != "true" ]; then
            echo "No fuzz-relevant changes — smoke skipped."; exit 0
          fi
          echo "fuzz-run matrix result: ${{ needs.fuzz-run.result }}"
          [ "${{ needs.fuzz-run.result }}" = "success" ] && exit 0
          echo "One or more harness smoke runs failed."; exit 1

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure
        run: cmake --preset coverage

      - name: Build
        run: cmake --build --preset coverage

      - name: Test
        run: ctest --preset coverage

      - name: Report
        # Search only the first-party object dirs — scanning all of
        # build/coverage feeds gcovr the FetchContent'd Catch2 .gcda files,
        # whose sources it cannot resolve (fatal in current gcovr)
        run: |
          pipx install gcovr
          mkdir -p coverage-report
          gcovr -r . build/coverage/lib build/coverage/cli \
                -f 'lib/' -f 'cli/' -e 'lib/vendor/' \
                --txt coverage-report/summary.txt \
                --html-details coverage-report/coverage.html \
                --print-summary
          { echo '### Line coverage — lib/ + cli/'; echo '```'; \
            cat coverage-report/summary.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce coverage floor
        # Ratchet, not target: 23% is a couple of points under the measured
        # baseline (25.7% pre-Phase-4). Epic #50 raises it; never lower it.
        run: |
          gcovr -r . build/coverage/lib build/coverage/cli \
                -f 'lib/' -f 'cli/' -e 'lib/vendor/' \
                --fail-under-line 23 > /dev/null

      - name: Upload HTML report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage-report/
