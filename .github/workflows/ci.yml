name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        # No pinned generator — the runner image's default Visual Studio moves
        # (VS 17 2022 is gone from windows-latest as of mid-2026)
        run: cmake -B build -A x64

      - name: Build
        run: cmake --build build --config Release
