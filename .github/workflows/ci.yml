name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        # The msvc preset uses the runner's default Visual Studio generator —
        # no pinned generator, because the image's default VS moves
        # (VS 17 2022 is gone from windows-latest as of mid-2026)
        run: cmake --preset msvc

      - name: Build
        run: cmake --build --preset msvc

      - name: Test
        run: ctest --preset msvc
