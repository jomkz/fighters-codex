name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "14 6 * * 1" # weekly sweep with refreshed query packs

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: analyze (c-cpp)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: c-cpp
          build-mode: manual
          config-file: ./.github/codeql/codeql-config.yml

      - name: Install GUI build deps
        # fxs builds on Linux since epic #46; FetchContent SDL3 needs the
        # X11/Wayland dev headers at compile time (no libsdl3-dev on ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxfixes-dev libxss-dev libxtst-dev libxkbcommon-dev libwayland-dev libdecor-0-dev \
            libegl1-mesa-dev libgl1-mesa-dev libdbus-1-dev

      - name: Build
        # Manual build so the extractor sees exactly what we ship; the gcc
        # preset covers fx_lib, fx, fxs, tools, and the test suite on
        # Linux. SDL3 sources land under build/** and are filtered below.
        run: |
          cmake --preset gcc
          cmake --build --preset gcc

      - uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: "/language:c-cpp"
          upload: failure-only
          output: sarif-results

      - name: Filter third-party paths and CLI argv false positives
        # For compiled languages the config's paths-ignore does not filter
        # results (verified on the first main analyses: vendored stb and
        # FetchContent'd Catch2 alerts came through both with and without
        # /** globs) — filtering the SARIF before upload is the supported
        # mechanism
        #
        # cpp/path-injection is rule-scoped out of cli/ only: fx is a CLI
        # whose job is opening user-named files, so an argv path reaching a
        # file open is user intent, not injection — every new verb minted a
        # fresh alert that needed a manual false-positive dismissal. The
        # rule stays live everywhere else (lib/, gui/, fxe/): paths derived
        # from *archive entry names* during extraction are a real injection
        # surface, and that is where this rule earns its keep.
        uses: advanced-security/filter-sarif@2da736ff05ef065cb2894ac6892e47b5eac2c3c0 # v1.1
        with:
          patterns: |
            -build/**
            -lib/vendor/**
            -gui/vendor/**
            -cli/**:cpp/path-injection
          input: sarif-results/cpp.sarif
          output: sarif-results/cpp.sarif

      - uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: sarif-results/cpp.sarif
