name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "14 6 * * 1" # weekly sweep with refreshed query packs

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: analyze (c-cpp)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: c-cpp
          build-mode: manual
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build
        # Manual build so the extractor sees exactly what we ship; the gcc
        # preset covers fx_lib, fx, tools, and the test suite on Linux.
        run: |
          cmake --preset gcc
          cmake --build --preset gcc

      - uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: "/language:c-cpp"
          upload: failure-only
          output: sarif-results

      - name: Filter third-party paths from results
        # For compiled languages the config's paths-ignore does not filter
        # results (verified on the first main analyses: vendored stb and
        # FetchContent'd Catch2 alerts came through both with and without
        # /** globs) — filtering the SARIF before upload is the supported
        # mechanism
        uses: advanced-security/filter-sarif@2da736ff05ef065cb2894ac6892e47b5eac2c3c0 # v1.1
        with:
          patterns: |
            -build/**
            -lib/vendor/**
            -gui/vendor/**
          input: sarif-results/cpp.sarif
          output: sarif-results/cpp.sarif

      - uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: sarif-results/cpp.sarif
