name: Release

on:
  push:
    tags:
      - "v*.*.*"
  # Dry run: build and package everything, publish nothing (the publish job
  # is gated on a tag ref). Artifact names use the branch name instead of a
  # version tag — cosmetic only.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure
        # The msvc preset uses the runner's default Visual Studio generator —
        # nothing pinned, because the image's default VS moves.
        # FX_SDL3_VENDORED pins SDL3 (static) so fxs.exe stays a single
        # self-contained executable (ADR-0001).
        run: cmake --preset msvc -DFX_SDL3_VENDORED=ON

      - name: Build
        run: cmake --build --preset msvc

      - name: Test
        # A release never ships untested binaries
        run: ctest --preset msvc

      - name: Set artifact ref
        # Dry runs use the branch name; slashes in it would become
        # nonexistent directories in the artifact paths. Tags pass through.
        run: echo "REF=$($env:GITHUB_REF_NAME -replace '/','-')" >> $env:GITHUB_ENV

      - name: Package fx (CLI)
        run: Compress-Archive -Path build/cli/Release/fx.exe -DestinationPath "fx-${{ env.REF }}-windows-x64.zip"

      - name: Package fxs
        run: Compress-Archive -Path build/gui/Release/fxs.exe -DestinationPath "fxs-${{ env.REF }}-windows-x64.zip"

      - name: Package fx_lib (developer SDK)
        run: |
          New-Item -ItemType Directory -Path fx-lib-sdk/include -Force | Out-Null
          Copy-Item build/lib/Release/fx_lib.lib fx-lib-sdk/
          Copy-Item -Recurse lib/include/fx fx-lib-sdk/include/
          Compress-Archive -Path fx-lib-sdk/* -DestinationPath "fx-lib-${{ env.REF }}-windows-x64.zip"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-packages
          path: "*.zip"

  linux:
    # Oldest LTS runner GitHub still offers => lowest glibc floor for the
    # shipped binary
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install GUI build deps
        # FetchContent SDL3 needs the X11/Wayland dev headers at compile
        # time; xvfb + llvmpipe give gui_smoke a GL 3.3 context
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxfixes-dev libxss-dev libxtst-dev libxkbcommon-dev libwayland-dev libdecor-0-dev \
            libegl1-mesa-dev libgl1-mesa-dev libdbus-1-dev \
            xvfb libgl1-mesa-dri

      - name: Configure
        # Static libstdc++/libgcc is a packaging property of the shipped
        # artifacts, applied here rather than in the preset so local release
        # builds don't require the static library packages; glibc stays the
        # binary's only runtime coupling. FX_SDL3_VENDORED pins SDL3 (static)
        # so the fxs tarball is self-contained — SDL resolves X11/Wayland/
        # audio via dlopen at runtime (ADR-0001).
        run: cmake --preset release -DCMAKE_EXE_LINKER_FLAGS="-static-libstdc++ -static-libgcc" -DFX_SDL3_VENDORED=ON

      - name: Build
        run: cmake --build --preset release

      - name: Test
        # A release never ships untested binaries
        run: xvfb-run -a ctest --preset release

      - name: Set artifact ref
        # Dry runs use the branch name; slashes in it would become
        # nonexistent directories in the artifact paths. Tags pass through.
        run: echo "REF=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_ENV"

      - name: Package fx (CLI)
        run: tar -czf "fx-${{ env.REF }}-linux-x64.tar.gz" -C build/release/cli fx

      - name: Package fxs
        run: tar -czf "fxs-${{ env.REF }}-linux-x64.tar.gz" -C build/release/gui fxs

      - name: Package fx_lib (developer SDK)
        run: |
          mkdir -p fx-lib-sdk/include
          cp build/release/lib/libfx_lib.a fx-lib-sdk/
          cp -r lib/include/fx fx-lib-sdk/include/
          tar -czf "fx-lib-${{ env.REF }}-linux-x64.tar.gz" -C fx-lib-sdk .

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-packages
          path: "*.tar.gz"

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [windows, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: "*-packages"
          merge-multiple: true

      - name: Extract changelog
        id: changelog
        run: |
          body="$(python3 scripts/extract-changelog.py "${GITHUB_REF_NAME#v}")"
          { echo "body<<CHANGELOG_EOF"; echo "$body"; echo "CHANGELOG_EOF"; } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          files: |
            fx-${{ github.ref_name }}-windows-x64.zip
            fxs-${{ github.ref_name }}-windows-x64.zip
            fx-lib-${{ github.ref_name }}-windows-x64.zip
            fx-${{ github.ref_name }}-linux-x64.tar.gz
            fxs-${{ github.ref_name }}-linux-x64.tar.gz
            fx-lib-${{ github.ref_name }}-linux-x64.tar.gz
