name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        # No pinned generator — the runner image's default Visual Studio moves
        # (VS 17 2022 is gone from windows-latest as of mid-2026)
        run: cmake -B build -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Package fx (CLI)
        run: Compress-Archive -Path build/cli/Release/fx.exe -DestinationPath "fx-${{ github.ref_name }}-windows-x64.zip"

      - name: Package fx-gui
        run: Compress-Archive -Path build/gui/Release/fx-gui.exe -DestinationPath "fx-gui-${{ github.ref_name }}-windows-x64.zip"

      - name: Package fx_lib (developer SDK)
        run: |
          New-Item -ItemType Directory -Path fx-lib-sdk/include -Force | Out-Null
          Copy-Item build/lib/Release/fx_lib.lib fx-lib-sdk/
          Copy-Item -Recurse lib/include/fx fx-lib-sdk/include/
          Compress-Archive -Path fx-lib-sdk/* -DestinationPath "fx-lib-${{ github.ref_name }}-windows-x64.zip"

      - name: Extract changelog
        id: changelog
        shell: pwsh
        run: |
          $ver = '${{ github.ref_name }}'.TrimStart('v')
          $content = Get-Content CHANGELOG.md -Raw
          $pattern = '(?s)## \[' + [regex]::Escape($ver) + '\].*?(?=\r?\n## \[)'
          $section = [regex]::Match($content, $pattern).Value
          $body = $section -replace "^## \[$([regex]::Escape($ver))\] - \d{4}-\d{2}-\d{2}\s*", ''
          "body<<EOF`n$($body.Trim())`nEOF" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          files: |
            fx-${{ github.ref_name }}-windows-x64.zip
            fx-gui-${{ github.ref_name }}-windows-x64.zip
            fx-lib-${{ github.ref_name }}-windows-x64.zip
