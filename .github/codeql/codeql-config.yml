name: fighters-codex CodeQL config

# security-extended: this is a library whose whole job is parsing untrusted
# binary files — the lower-severity memory-safety queries are on-target.
queries:
  - uses: security-extended

# NOTE: for compiled languages paths-ignore does NOT filter results — it
# only scopes extraction for interpreted languages. First-party-only results
# are enforced by the filter-sarif step in codeql.yml (same patterns). This
# block stays as documentation of intent and future-proofing.
paths-ignore:
  - build/**
  - lib/vendor/**
  - gui/vendor/**
