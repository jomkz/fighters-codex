<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="-apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="Palette pipeline: PALETTE.PAL is extracted DCL-compressed from FA_2.LIB as 256 six-bit RGB triplets, scaled to 8-bit into a lookup table; PIC pixel bytes index that table to produce screen colors, and fx pic pack quantizes new art back through the same palette.">
  <style>
    :root { color-scheme: light dark; }
    .box   { fill: #f4f6f8; stroke: #5b6b7a; stroke-width: 1.5; }
    .hub   { fill: #fdf4e3; stroke: #b8892f; stroke-width: 1.5; }
    .fmt   { fill: #e8f0fb; stroke: #3d6aa8; stroke-width: 1.5; }
    .sys   { fill: #eaf4ec; stroke: #3f7d4f; stroke-width: 1.5; }
    .lbl   { fill: #22303c; font-size: 14px; }
    .sub   { fill: #4a5a67; font-size: 11.5px; }
    .mono  { font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 12px; }
    .lanetitle { fill: #33424e; font-size: 13px; font-weight: 600; letter-spacing: .04em; }
    .edge  { fill: none; stroke: #5b6b7a; stroke-width: 1.6; }
    @media (prefers-color-scheme: dark) {
      .box { fill: #232a31; stroke: #7f8f9d; } .hub { fill: #322a1a; stroke: #d9b45f; }
      .fmt { fill: #1e2c3e; stroke: #6f9bd6; } .sys { fill: #1d2c22; stroke: #6fae7f; }
      .lbl { fill: #dce4ea; } .sub { fill: #a6b3bd; } .lanetitle { fill: #c7d2da; }
      .edge { stroke: #8a99a5; }
    }
    :root[data-theme="dark"] .box { fill: #232a31; stroke: #7f8f9d; }
    :root[data-theme="dark"] .hub { fill: #322a1a; stroke: #d9b45f; }
    :root[data-theme="dark"] .fmt { fill: #1e2c3e; stroke: #6f9bd6; }
    :root[data-theme="dark"] .sys { fill: #1d2c22; stroke: #6fae7f; }
    :root[data-theme="dark"] .lbl { fill: #dce4ea; }
    :root[data-theme="dark"] .sub { fill: #a6b3bd; }
    :root[data-theme="dark"] .lanetitle { fill: #c7d2da; }
    :root[data-theme="dark"] .edge { stroke: #8a99a5; }
    :root[data-theme="light"] .box { fill: #f4f6f8; stroke: #5b6b7a; }
    :root[data-theme="light"] .hub { fill: #fdf4e3; stroke: #b8892f; }
    :root[data-theme="light"] .fmt { fill: #e8f0fb; stroke: #3d6aa8; }
    :root[data-theme="light"] .sys { fill: #eaf4ec; stroke: #3f7d4f; }
    :root[data-theme="light"] .lbl { fill: #22303c; }
    :root[data-theme="light"] .sub { fill: #4a5a67; }
    :root[data-theme="light"] .lanetitle { fill: #33424e; }
    :root[data-theme="light"] .edge { stroke: #5b6b7a; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7f8f9d"/>
    </marker>
  </defs>

  <text class="lanetitle" x="90" y="40">DECODE PATH — game data to screen</text>

  <rect class="box" x="90" y="56" width="150" height="56" rx="6"/>
  <text class="lbl" x="165" y="80" text-anchor="middle">FA_2.LIB</text>
  <text class="sub" x="165" y="98" text-anchor="middle">PALETTE.PAL entry</text>

  <rect class="hub" x="300" y="56" width="210" height="56" rx="6"/>
  <text class="lbl" x="405" y="76" text-anchor="middle">PALETTE.PAL — 768 B</text>
  <text class="sub mono" x="405" y="92" text-anchor="middle">256 × [R][G][B]</text>
  <text class="sub" x="405" y="106" text-anchor="middle">6-bit channels (0–63)</text>

  <rect class="sys" x="570" y="56" width="170" height="56" rx="6"/>
  <text class="lbl" x="655" y="76" text-anchor="middle">scale to 8-bit</text>
  <text class="sub mono" x="655" y="96" text-anchor="middle">(v&lt;&lt;2) | (v&gt;&gt;6)</text>

  <rect class="fmt" x="790" y="56" width="140" height="56" rx="6"/>
  <text class="lbl" x="860" y="76" text-anchor="middle">RGB table</text>
  <text class="sub" x="860" y="96" text-anchor="middle">256 × 24-bit</text>

  <path class="edge" d="M240 84 H 296" marker-end="url(#arr)"/>
  <text class="sub" x="268" y="76" text-anchor="middle">DCL</text>
  <path class="edge" d="M510 84 H 566" marker-end="url(#arr)"/>
  <path class="edge" d="M740 84 H 786" marker-end="url(#arr)"/>

  <rect class="box" x="300" y="160" width="210" height="56" rx="6"/>
  <text class="lbl" x="405" y="182" text-anchor="middle">PIC pixel bytes</text>
  <text class="sub" x="405" y="200" text-anchor="middle">1 B = palette index · 0xFF transparent</text>

  <rect class="fmt" x="790" y="160" width="140" height="56" rx="6"/>
  <text class="lbl" x="860" y="184" text-anchor="middle">screen color</text>
  <text class="sub" x="860" y="202" text-anchor="middle">per pixel</text>

  <path class="edge" d="M510 188 C 620 188, 700 150, 830 116" marker-end="url(#arr)"/>
  <text class="sub" x="640" y="170" text-anchor="middle">index into table</text>
  <path class="edge" d="M860 112 L 860 156" marker-end="url(#arr)"/>

  <text class="lanetitle" x="90" y="272">ENCODE PATH — modded art back into the game</text>

  <rect class="box" x="90" y="288" width="150" height="56" rx="6"/>
  <text class="lbl" x="165" y="312" text-anchor="middle">PNG art</text>
  <text class="sub" x="165" y="330" text-anchor="middle">same dimensions</text>

  <rect class="sys" x="300" y="288" width="280" height="56" rx="6"/>
  <text class="lbl mono" x="440" y="312" text-anchor="middle">fx pic pack -p PALETTE.PAL</text>
  <text class="sub" x="440" y="330" text-anchor="middle">quantize each pixel to the nearest palette color</text>

  <rect class="fmt" x="640" y="288" width="290" height="56" rx="6"/>
  <text class="lbl" x="785" y="312" text-anchor="middle">.PIC — format 0, inline palette</text>
  <text class="sub" x="785" y="330" text-anchor="middle">inline palettes use the same 6-bit encoding</text>

  <path class="edge" d="M240 316 H 296" marker-end="url(#arr)"/>
  <path class="edge" d="M580 316 H 636" marker-end="url(#arr)"/>

  <text class="sub" x="90" y="390">A PIC with <tspan class="mono">palette_size = 0</tspan> uses the system palette; a partial inline palette overrides only its first entries.</text>
  <text class="sub" x="90" y="408">USNF, ATF, and FA each ship their own PALETTE.PAL — palettes are not interchangeable between game versions.</text>
</svg>
