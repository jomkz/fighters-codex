<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 470" font-family="-apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="FA.EXE flight-model update: control inputs and the current loadout feed FMUpdatePlaneFields, which recomputes weight, thrust, drag and fuel each frame and writes the aircraft state back to the entity mirror.">
  <style>
    :root { color-scheme: light dark; }
    .box   { fill: #f4f6f8; stroke: #5b6b7a; stroke-width: 1.5; }
    .setup { fill: #e8f0fb; stroke: #3d6aa8; stroke-width: 1.5; }
    .run   { fill: #eaf4ec; stroke: #3f7d4f; stroke-width: 1.5; }
    .dec   { fill: #fdf4e3; stroke: #b8892f; stroke-width: 1.5; }
    .lbl   { fill: #22303c; font-size: 14px; }
    .sub   { fill: #4a5a67; font-size: 11.5px; }
    .mono  { font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
    .lanetitle { fill: #33424e; font-size: 12px; font-weight: 600; letter-spacing: .05em; }
    .edge  { fill: none; stroke: #5b6b7a; stroke-width: 1.6; }
    .edgelbl { fill: #4a5a67; font-size: 11px; }
    @media (prefers-color-scheme: dark) {
      .box{fill:#232a31;stroke:#7f8f9d;} .setup{fill:#1e2c3e;stroke:#6f9bd6;}
      .run{fill:#1d2c22;stroke:#6fae7f;} .dec{fill:#322a1a;stroke:#d9b45f;}
      .lbl{fill:#dce4ea;} .sub{fill:#a6b3bd;} .lanetitle{fill:#c7d2da;}
      .edge{stroke:#8a99a5;} .edgelbl{fill:#a6b3bd;}
    }
    :root[data-theme="dark"] .box{fill:#232a31;stroke:#7f8f9d;}
    :root[data-theme="dark"] .setup{fill:#1e2c3e;stroke:#6f9bd6;}
    :root[data-theme="dark"] .run{fill:#1d2c22;stroke:#6fae7f;}
    :root[data-theme="dark"] .dec{fill:#322a1a;stroke:#d9b45f;}
    :root[data-theme="dark"] .lbl{fill:#dce4ea;} :root[data-theme="dark"] .sub{fill:#a6b3bd;}
    :root[data-theme="dark"] .lanetitle{fill:#c7d2da;} :root[data-theme="dark"] .edge{stroke:#8a99a5;}
    :root[data-theme="dark"] .edgelbl{fill:#a6b3bd;}
    :root[data-theme="light"] .box{fill:#f4f6f8;stroke:#5b6b7a;}
    :root[data-theme="light"] .setup{fill:#e8f0fb;stroke:#3d6aa8;}
    :root[data-theme="light"] .run{fill:#eaf4ec;stroke:#3f7d4f;}
    :root[data-theme="light"] .dec{fill:#fdf4e3;stroke:#b8892f;}
    :root[data-theme="light"] .lbl{fill:#22303c;} :root[data-theme="light"] .sub{fill:#4a5a67;}
    :root[data-theme="light"] .lanetitle{fill:#33424e;} :root[data-theme="light"] .edge{stroke:#5b6b7a;}
    :root[data-theme="light"] .edgelbl{fill:#4a5a67;}
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" class="edge" stroke="none" fill="context-stroke"/>
    </marker>
  </defs>

  <text x="410" y="26" text-anchor="middle" class="lanetitle">FLIGHT-MODEL UPDATE — per frame</text>

  <!-- inputs -->
  <rect class="setup" x="70" y="48" width="290" height="62" rx="6"/>
  <text x="215" y="72" text-anchor="middle" class="lbl mono">control inputs</text>
  <text x="215" y="91" text-anchor="middle" class="sub">throttle · stick · gear/flap/brake/hook/bay</text>

  <rect class="box" x="460" y="48" width="290" height="62" rx="6"/>
  <text x="605" y="72" text-anchor="middle" class="lbl mono">loadout · HARD_*</text>
  <text x="605" y="91" text-anchor="middle" class="sub">stores on each hardpoint (HARDPtrs)</text>

  <!-- FMUpdatePlaneFields -->
  <rect class="run" x="250" y="160" width="320" height="58" rx="6"/>
  <text x="410" y="184" text-anchor="middle" class="lbl mono">FMUpdatePlaneFields</text>
  <text x="410" y="203" text-anchor="middle" class="sub">recompute derived aircraft state</text>

  <!-- four outputs -->
  <rect class="dec" x="60" y="268" width="160" height="58" rx="6"/>
  <text x="140" y="292" text-anchor="middle" class="lbl mono">weight</text>
  <text x="140" y="311" text-anchor="middle" class="sub">FMGetWeight <- HARD</text>
  <rect class="dec" x="240" y="268" width="150" height="58" rx="6"/>
  <text x="315" y="292" text-anchor="middle" class="lbl mono">thrust</text>
  <text x="315" y="311" text-anchor="middle" class="sub">FMVector · throttle</text>
  <rect class="dec" x="410" y="268" width="140" height="58" rx="6"/>
  <text x="480" y="292" text-anchor="middle" class="lbl mono">drag</text>
  <text x="480" y="311" text-anchor="middle" class="sub">airframe · gear/flap</text>
  <rect class="dec" x="570" y="268" width="180" height="58" rx="6"/>
  <text x="660" y="292" text-anchor="middle" class="lbl mono">fuel</text>
  <text x="660" y="311" text-anchor="middle" class="sub">FMFuelConsumption -> BurnFuel</text>

  <!-- aircraft state -->
  <rect class="box" x="230" y="388" width="360" height="54" rx="6"/>
  <text x="410" y="410" text-anchor="middle" class="lbl mono">aircraft state -> _cg mirror</text>
  <text x="410" y="428" text-anchor="middle" class="sub">written back to the entity for this frame</text>

  <!-- edges -->
  <path class="edge" d="M215,110 L340,157" marker-end="url(#arrow)"/>
  <path class="edge" d="M605,110 L480,157" marker-end="url(#arrow)"/>
  <path class="edge" d="M605,110 L605,250 L140,250 L140,265" marker-end="url(#arrow)"/>
  <text x="360" y="245" text-anchor="middle" class="edgelbl">store weights</text>
  <path class="edge" d="M330,218 L150,265" marker-end="url(#arrow)"/>
  <path class="edge" d="M380,218 L320,265" marker-end="url(#arrow)"/>
  <path class="edge" d="M440,218 L480,265" marker-end="url(#arrow)"/>
  <path class="edge" d="M490,218 L655,265" marker-end="url(#arrow)"/>
  <path class="edge" d="M140,326 L140,360 L360,360 L390,385" marker-end="url(#arrow)"/>
  <path class="edge" d="M315,326 L315,360" marker-end="url(#arrow)"/>
  <path class="edge" d="M480,326 L480,360" marker-end="url(#arrow)"/>
  <path class="edge" d="M660,326 L660,360 L455,360 L430,385" marker-end="url(#arrow)"/>
</svg>
