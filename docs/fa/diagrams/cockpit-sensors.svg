<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 300" font-family="-apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="Cockpit sensor model: every object is scored by CPComputeRCS into a radar and IR signature, gated by CPAddItemToScopes into the radar/IR and RWR contact buffers, which CPDraw renders to the cockpit scopes and the weapons seeker model consumes.">
  <style>
    :root { color-scheme: light dark; }
    .box{fill:#f4f6f8;stroke:#5b6b7a;stroke-width:1.5;} .rcs{fill:#e8f0fb;stroke:#3d6aa8;stroke-width:1.5;}
    .gate{fill:#fdf4e3;stroke:#b8892f;stroke-width:1.5;} .buf{fill:#eaf4ec;stroke:#3f7d4f;stroke-width:1.5;} .out{fill:#fbecea;stroke:#b25548;stroke-width:1.5;}
    .lbl{fill:#22303c;font-size:13.5px;} .sub{fill:#4a5a67;font-size:11px;} .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;}
    .title{fill:#33424e;font-size:12px;font-weight:600;letter-spacing:.05em;} .edge{fill:none;stroke:#5b6b7a;stroke-width:1.6;} .el{fill:#4a5a67;font-size:10.5px;}
    @media (prefers-color-scheme: dark){
      .box{fill:#232a31;stroke:#7f8f9d;} .rcs{fill:#1e2c3e;stroke:#6f9bd6;} .gate{fill:#322a1a;stroke:#d9b45f;} .buf{fill:#1d2c22;stroke:#6fae7f;} .out{fill:#33221f;stroke:#d98a7c;}
      .lbl{fill:#dce4ea;} .sub{fill:#a6b3bd;} .title{fill:#c7d2da;} .edge{stroke:#8a99a5;} .el{fill:#a6b3bd;}
    }
    :root[data-theme="dark"] .box{fill:#232a31;stroke:#7f8f9d;} :root[data-theme="dark"] .rcs{fill:#1e2c3e;stroke:#6f9bd6;}
    :root[data-theme="dark"] .gate{fill:#322a1a;stroke:#d9b45f;} :root[data-theme="dark"] .buf{fill:#1d2c22;stroke:#6fae7f;} :root[data-theme="dark"] .out{fill:#33221f;stroke:#d98a7c;}
    :root[data-theme="dark"] .lbl{fill:#dce4ea;} :root[data-theme="dark"] .sub{fill:#a6b3bd;} :root[data-theme="dark"] .title{fill:#c7d2da;} :root[data-theme="dark"] .edge{stroke:#8a99a5;} :root[data-theme="dark"] .el{fill:#a6b3bd;}
    :root[data-theme="light"] .box{fill:#f4f6f8;stroke:#5b6b7a;} :root[data-theme="light"] .rcs{fill:#e8f0fb;stroke:#3d6aa8;}
    :root[data-theme="light"] .gate{fill:#fdf4e3;stroke:#b8892f;} :root[data-theme="light"] .buf{fill:#eaf4ec;stroke:#3f7d4f;} :root[data-theme="light"] .out{fill:#fbecea;stroke:#b25548;}
    :root[data-theme="light"] .lbl{fill:#22303c;} :root[data-theme="light"] .sub{fill:#4a5a67;} :root[data-theme="light"] .title{fill:#33424e;} :root[data-theme="light"] .edge{stroke:#5b6b7a;} :root[data-theme="light"] .el{fill:#4a5a67;}
  </style>
  <defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" class="el" stroke="none"/></marker></defs>

  <text x="16" y="24" class="title">COCKPIT SENSOR MODEL — per frame, for every object</text>

  <rect x="16" y="112" width="120" height="56" rx="6" class="box"/>
  <text x="76" y="136" text-anchor="middle" class="lbl">objects</text>
  <text x="76" y="153" text-anchor="middle" class="sub">every entity</text>

  <rect x="184" y="104" width="150" height="72" rx="6" class="rcs"/>
  <text x="259" y="128" text-anchor="middle" class="lbl mono">CPComputeRCS</text>
  <text x="259" y="146" text-anchor="middle" class="sub">size + config + aspect</text>
  <text x="259" y="161" text-anchor="middle" class="sub">→ radar / IR signature</text>

  <rect x="382" y="104" width="150" height="72" rx="6" class="gate"/>
  <text x="457" y="128" text-anchor="middle" class="lbl mono">CPAddItemToScopes</text>
  <text x="457" y="146" text-anchor="middle" class="sub">radar / IR / RWR</text>
  <text x="457" y="161" text-anchor="middle" class="sub">detection gates</text>

  <rect x="580" y="72" width="150" height="52" rx="6" class="buf"/>
  <text x="655" y="93" text-anchor="middle" class="lbl">contact buffers</text>
  <text x="655" y="110" text-anchor="middle" class="sub mono">0x53BEA8 · 0x539E58</text>

  <rect x="580" y="156" width="150" height="52" rx="6" class="out"/>
  <text x="655" y="177" text-anchor="middle" class="lbl mono">CPDraw</text>
  <text x="655" y="194" text-anchor="middle" class="sub">cockpit scopes / MFDs</text>

  <rect x="580" y="240" width="150" height="44" rx="6" class="box"/>
  <text x="655" y="260" text-anchor="middle" class="lbl">weapons seeker</text>
  <text x="655" y="276" text-anchor="middle" class="sub">weapons.md · lock/notch</text>

  <path d="M136 140 H182" class="edge" marker-end="url(#a)"/>
  <path d="M334 140 H380" class="edge" marker-end="url(#a)"/>
  <path d="M532 130 C556 130 556 98 578 98" class="edge" marker-end="url(#a)"/>
  <path d="M655 124 V154" class="edge" marker-end="url(#a)"/>
  <path d="M655 208 V238" class="edge" marker-end="url(#a)"/>

  <text x="16" y="270" class="el">per-frame drivers: <tspan class="mono">CPUpdateRadar</tspan> (sweep) · <tspan class="mono">CPUpdateIRItems</tspan> (IR) · <tspan class="mono">CPResetRWR</tspan> (clear)</text>
</svg>
