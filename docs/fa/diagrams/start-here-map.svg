<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="-apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="Map from game concepts (aircraft, missions, theaters, cockpits, sound, movies) through the LIB archives to file formats and the engine subsystems that consume them.">
  <style>
    :root { color-scheme: light dark; }
    .box   { fill: #f4f6f8; stroke: #5b6b7a; stroke-width: 1.5; }
    .hub   { fill: #fdf4e3; stroke: #b8892f; stroke-width: 1.5; }
    .fmt   { fill: #e8f0fb; stroke: #3d6aa8; stroke-width: 1.5; }
    .sys   { fill: #eaf4ec; stroke: #3f7d4f; stroke-width: 1.5; }
    .lbl   { fill: #22303c; font-size: 14px; }
    .sub   { fill: #4a5a67; font-size: 11.5px; }
    .mono  { font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; font-size: 12.5px; }
    .lanetitle { fill: #33424e; font-size: 13px; font-weight: 600; letter-spacing: .04em; }
    .edge  { fill: none; stroke: #5b6b7a; stroke-width: 1.6; }
    @media (prefers-color-scheme: dark) {
      .box { fill: #232a31; stroke: #7f8f9d; }
      .hub { fill: #322a1a; stroke: #d9b45f; }
      .fmt { fill: #1e2c3e; stroke: #6f9bd6; }
      .sys { fill: #1d2c22; stroke: #6fae7f; }
      .lbl { fill: #dce4ea; } .sub { fill: #a6b3bd; }
      .lanetitle { fill: #c7d2da; } .edge { stroke: #8a99a5; }
    }
    :root[data-theme="dark"] .box { fill: #232a31; stroke: #7f8f9d; }
    :root[data-theme="dark"] .hub { fill: #322a1a; stroke: #d9b45f; }
    :root[data-theme="dark"] .fmt { fill: #1e2c3e; stroke: #6f9bd6; }
    :root[data-theme="dark"] .sys { fill: #1d2c22; stroke: #6fae7f; }
    :root[data-theme="dark"] .lbl { fill: #dce4ea; }
    :root[data-theme="dark"] .sub { fill: #a6b3bd; }
    :root[data-theme="dark"] .lanetitle { fill: #c7d2da; }
    :root[data-theme="dark"] .edge { stroke: #8a99a5; }
    :root[data-theme="light"] .box { fill: #f4f6f8; stroke: #5b6b7a; }
    :root[data-theme="light"] .hub { fill: #fdf4e3; stroke: #b8892f; }
    :root[data-theme="light"] .fmt { fill: #e8f0fb; stroke: #3d6aa8; }
    :root[data-theme="light"] .sys { fill: #eaf4ec; stroke: #3f7d4f; }
    :root[data-theme="light"] .lbl { fill: #22303c; }
    :root[data-theme="light"] .sub { fill: #4a5a67; }
    :root[data-theme="light"] .lanetitle { fill: #33424e; }
    :root[data-theme="light"] .edge { stroke: #5b6b7a; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7f8f9d"/>
    </marker>
  </defs>

  <!-- lane titles -->
  <text class="lanetitle" x="115" y="34" text-anchor="middle">YOU KNEW IT AS</text>
  <text class="lanetitle" x="365" y="34" text-anchor="middle">PACKED INTO</text>
  <text class="lanetitle" x="610" y="34" text-anchor="middle">STORED AS</text>
  <text class="lanetitle" x="850" y="34" text-anchor="middle">BROUGHT TO LIFE BY</text>

  <!-- column 1: game concepts -->
  <rect class="box" x="20" y="60"  width="190" height="56" rx="6"/>
  <text class="lbl" x="115" y="84"  text-anchor="middle">Aircraft &amp; objects</text>
  <text class="sub" x="115" y="102" text-anchor="middle">models · stats · spec sheets</text>

  <rect class="box" x="20" y="150" width="190" height="56" rx="6"/>
  <text class="lbl" x="115" y="174" text-anchor="middle">Missions &amp; campaigns</text>
  <text class="sub" x="115" y="192" text-anchor="middle">placements · briefings · AI</text>

  <rect class="box" x="20" y="240" width="190" height="56" rx="6"/>
  <text class="lbl" x="115" y="264" text-anchor="middle">Theaters</text>
  <text class="sub" x="115" y="282" text-anchor="middle">terrain · planning maps</text>

  <rect class="box" x="20" y="330" width="190" height="56" rx="6"/>
  <text class="lbl" x="115" y="354" text-anchor="middle">Cockpits &amp; menus</text>
  <text class="sub" x="115" y="372" text-anchor="middle">art · palettes · fonts</text>

  <rect class="box" x="20" y="420" width="190" height="56" rx="6"/>
  <text class="lbl" x="115" y="444" text-anchor="middle">Sound &amp; music</text>
  <text class="sub" x="115" y="462" text-anchor="middle">effects · MIDI scores</text>

  <rect class="box" x="20" y="510" width="190" height="56" rx="6"/>
  <text class="lbl" x="115" y="534" text-anchor="middle">Movies</text>
  <text class="sub" x="115" y="552" text-anchor="middle">intros · video briefings</text>

  <!-- column 2: the LIB hub -->
  <rect class="hub" x="280" y="250" width="170" height="120" rx="8"/>
  <text class="lbl mono" x="365" y="285" text-anchor="middle">.LIB archives</text>
  <text class="sub" x="365" y="308" text-anchor="middle">install dir + game CDs</text>
  <text class="sub" x="365" y="326" text-anchor="middle">resource manager</text>
  <text class="sub" x="365" y="344" text-anchor="middle">unpacks entries</text>

  <!-- column 3: formats -->
  <rect class="fmt" x="520" y="60"  width="180" height="56" rx="6"/>
  <text class="lbl mono" x="610" y="93"  text-anchor="middle">SH · PT · INF</text>

  <rect class="fmt" x="520" y="150" width="180" height="56" rx="6"/>
  <text class="lbl mono" x="610" y="183" text-anchor="middle">M · MT · CAM · AI</text>

  <rect class="fmt" x="520" y="240" width="180" height="56" rx="6"/>
  <text class="lbl mono" x="610" y="273" text-anchor="middle">T2 · MM</text>

  <rect class="fmt" x="520" y="330" width="180" height="56" rx="6"/>
  <text class="lbl mono" x="610" y="363" text-anchor="middle">PIC · PAL · FNT</text>

  <rect class="fmt" x="520" y="420" width="180" height="56" rx="6"/>
  <text class="lbl mono" x="610" y="453" text-anchor="middle">11K · XMI · MUS</text>

  <rect class="fmt" x="520" y="510" width="180" height="56" rx="6"/>
  <text class="lbl mono" x="610" y="543" text-anchor="middle">CB8 · VDO · SEQ</text>

  <!-- column 4: engine subsystems -->
  <rect class="sys" x="760" y="60"  width="180" height="56" rx="6"/>
  <text class="lbl" x="850" y="84"  text-anchor="middle">Objects &amp; rendering</text>
  <text class="sub" x="850" y="102" text-anchor="middle">objects · shapes · renderer</text>

  <rect class="sys" x="760" y="150" width="180" height="56" rx="6"/>
  <text class="lbl" x="850" y="174" text-anchor="middle">Campaign &amp; AI</text>
  <text class="sub" x="850" y="192" text-anchor="middle">campaign · AI interpreter</text>

  <rect class="sys" x="760" y="240" width="180" height="56" rx="6"/>
  <text class="lbl" x="850" y="264" text-anchor="middle">Terrain</text>
  <text class="sub" x="850" y="282" text-anchor="middle">terrain · render core</text>

  <rect class="sys" x="760" y="330" width="180" height="56" rx="6"/>
  <text class="lbl" x="850" y="354" text-anchor="middle">Shell UI &amp; HUD</text>
  <text class="sub" x="850" y="372" text-anchor="middle">shell-ui · hud</text>

  <rect class="sys" x="760" y="420" width="180" height="56" rx="6"/>
  <text class="lbl" x="850" y="444" text-anchor="middle">Sound</text>
  <text class="sub" x="850" y="462" text-anchor="middle">sound · WAIL32</text>

  <rect class="sys" x="760" y="510" width="180" height="56" rx="6"/>
  <text class="lbl" x="850" y="534" text-anchor="middle">Video &amp; cutscenes</text>
  <text class="sub" x="850" y="552" text-anchor="middle">video decode · seq player</text>

  <!-- edges: concepts converge on the LIB hub -->
  <path class="edge" d="M210 88  C 248 88,  248 262, 278 264" marker-end="url(#arr)"/>
  <path class="edge" d="M210 178 C 248 178, 248 280, 278 282" marker-end="url(#arr)"/>
  <path class="edge" d="M210 268 C 240 268, 250 298, 278 300" marker-end="url(#arr)"/>
  <path class="edge" d="M210 358 C 240 358, 250 320, 278 318" marker-end="url(#arr)"/>
  <path class="edge" d="M210 448 C 248 448, 248 338, 278 336" marker-end="url(#arr)"/>
  <path class="edge" d="M210 538 C 248 538, 248 356, 278 354" marker-end="url(#arr)"/>

  <!-- edges: hub fans out to the format clusters -->
  <path class="edge" d="M450 264 C 482 262, 482 88,  518 88"  marker-end="url(#arr)"/>
  <path class="edge" d="M450 282 C 482 280, 482 178, 518 178" marker-end="url(#arr)"/>
  <path class="edge" d="M450 300 C 478 298, 488 268, 518 268" marker-end="url(#arr)"/>
  <path class="edge" d="M450 318 C 478 320, 488 358, 518 358" marker-end="url(#arr)"/>
  <path class="edge" d="M450 336 C 482 338, 482 448, 518 448" marker-end="url(#arr)"/>
  <path class="edge" d="M450 354 C 482 356, 482 538, 518 538" marker-end="url(#arr)"/>

  <!-- edges: formats to subsystems -->
  <path class="edge" d="M700 88  H 758" marker-end="url(#arr)"/>
  <path class="edge" d="M700 178 H 758" marker-end="url(#arr)"/>
  <path class="edge" d="M700 268 H 758" marker-end="url(#arr)"/>
  <path class="edge" d="M700 358 H 758" marker-end="url(#arr)"/>
  <path class="edge" d="M700 448 H 758" marker-end="url(#arr)"/>
  <path class="edge" d="M700 538 H 758" marker-end="url(#arr)"/>
</svg>
