<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" font-family="-apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="SEQ cutscene player: PlaySeq drives SeqStart/SeqContinue/SeqEnd; SeqContinue builds a SEQ+command name and dispatches it via _SMAddress to the script-op handlers.">
  <style>
    :root { color-scheme: light dark; }
    .box{fill:#f4f6f8;stroke:#5b6b7a;stroke-width:1.5;} .setup{fill:#e8f0fb;stroke:#3d6aa8;stroke-width:1.5;}
    .run{fill:#eaf4ec;stroke:#3f7d4f;stroke-width:1.5;} .dec{fill:#fdf4e3;stroke:#b8892f;stroke-width:1.5;} .dmg{fill:#fbecea;stroke:#b25548;stroke-width:1.5;}
    .lbl{fill:#22303c;font-size:13.5px;} .sub{fill:#4a5a67;font-size:11px;} .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;}
    .title{fill:#33424e;font-size:12px;font-weight:600;letter-spacing:.05em;} .edge{fill:none;stroke:#5b6b7a;stroke-width:1.6;} .el{fill:#4a5a67;font-size:11px;}
    @media (prefers-color-scheme: dark){
      .box{fill:#232a31;stroke:#7f8f9d;} .setup{fill:#1e2c3e;stroke:#6f9bd6;} .run{fill:#1d2c22;stroke:#6fae7f;} .dec{fill:#322a1a;stroke:#d9b45f;} .dmg{fill:#33221f;stroke:#d98a7c;}
      .lbl{fill:#dce4ea;} .sub{fill:#a6b3bd;} .title{fill:#c7d2da;} .edge{stroke:#8a99a5;} .el{fill:#a6b3bd;}
    }
    :root[data-theme="dark"] .box{fill:#232a31;stroke:#7f8f9d;} :root[data-theme="dark"] .setup{fill:#1e2c3e;stroke:#6f9bd6;}
    :root[data-theme="dark"] .run{fill:#1d2c22;stroke:#6fae7f;} :root[data-theme="dark"] .dec{fill:#322a1a;stroke:#d9b45f;} :root[data-theme="dark"] .dmg{fill:#33221f;stroke:#d98a7c;}
    :root[data-theme="dark"] .lbl{fill:#dce4ea;} :root[data-theme="dark"] .sub{fill:#a6b3bd;} :root[data-theme="dark"] .title{fill:#c7d2da;} :root[data-theme="dark"] .edge{stroke:#8a99a5;} :root[data-theme="dark"] .el{fill:#a6b3bd;}
    :root[data-theme="light"] .box{fill:#f4f6f8;stroke:#5b6b7a;} :root[data-theme="light"] .setup{fill:#e8f0fb;stroke:#3d6aa8;}
    :root[data-theme="light"] .run{fill:#eaf4ec;stroke:#3f7d4f;} :root[data-theme="light"] .dec{fill:#fdf4e3;stroke:#b8892f;} :root[data-theme="light"] .dmg{fill:#fbecea;stroke:#b25548;}
    :root[data-theme="light"] .lbl{fill:#22303c;} :root[data-theme="light"] .sub{fill:#4a5a67;} :root[data-theme="light"] .title{fill:#33424e;} :root[data-theme="light"] .edge{stroke:#5b6b7a;} :root[data-theme="light"] .el{fill:#4a5a67;}
  </style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="edge" stroke="none" fill="context-stroke"/></marker></defs>
  <text x="410" y="22" text-anchor="middle" class="title">.SEQ CUTSCENE PLAYER - NAME-DISPATCHED SCRIPT</text>

  <rect class="run" x="300" y="38" width="220" height="48" rx="6"/>
  <text x="410" y="60" text-anchor="middle" class="lbl mono">PlaySeq(file, w, h)</text>
  <text x="410" y="77" text-anchor="middle" class="sub">blocking driver: Start -> loop -> End</text>

  <rect class="setup" x="40" y="122" width="250" height="56" rx="6"/>
  <text x="165" y="145" text-anchor="middle" class="lbl mono">SeqStart: compile script</text>
  <text x="165" y="163" text-anchor="middle" class="sub">SeqLoadScript / ExpandLine / include</text>

  <rect class="run" x="322" y="122" width="176" height="56" rx="6"/>
  <text x="410" y="145" text-anchor="middle" class="lbl mono">SeqContinue</text>
  <text x="410" y="163" text-anchor="middle" class="sub">per-tick interpreter</text>

  <rect class="dec" x="540" y="122" width="240" height="56" rx="6"/>
  <text x="660" y="144" text-anchor="middle" class="lbl mono">build "SEQ"+cmd</text>
  <text x="660" y="162" text-anchor="middle" class="sub">_SMAddress -> indirect call</text>

  <rect class="box" x="40" y="238" width="234" height="58" rx="6"/>
  <text x="157" y="261" text-anchor="middle" class="lbl mono">SEQbitmap / block / text</text>
  <text x="157" y="279" text-anchor="middle" class="sub">SeqNewGraphic -> SEQGR node</text>

  <rect class="dec" x="300" y="238" width="200" height="58" rx="6"/>
  <text x="400" y="261" text-anchor="middle" class="lbl mono">SEQfadein / fadeout</text>
  <text x="400" y="279" text-anchor="middle" class="sub">SeqFadeIn/Out -> palette</text>

  <rect class="box" x="526" y="238" width="254" height="58" rx="6"/>
  <text x="653" y="261" text-anchor="middle" class="lbl mono">SEQmusic / sound / video</text>
  <text x="653" y="279" text-anchor="middle" class="sub">MusicOn / sound / videoState</text>

  <rect class="box" x="40" y="350" width="234" height="48" rx="6"/>
  <text x="157" y="372" text-anchor="middle" class="lbl mono">SEQGR display-list ring</text>
  <text x="157" y="389" text-anchor="middle" class="sub">SeqRender -> GG_Flush</text>

  <rect class="setup" x="546" y="350" width="234" height="48" rx="6"/>
  <text x="663" y="372" text-anchor="middle" class="lbl mono">SeqEnd</text>
  <text x="663" y="389" text-anchor="middle" class="sub">SoundAllOff / MusicOff / free</text>

  <path class="edge" d="M360,86 L200,120" marker-end="url(#arrow)"/>
  <path class="edge" d="M440,86 L430,120" marker-end="url(#arrow)"/>
  <path class="edge" d="M290,150 L320,150" marker-end="url(#arrow)"/>
  <path class="edge" d="M498,150 L538,150" marker-end="url(#arrow)"/>
  <path class="edge" d="M640,178 L200,236" marker-end="url(#arrow)"/>
  <path class="edge" d="M660,178 L410,236" marker-end="url(#arrow)"/>
  <path class="edge" d="M670,178 L655,236" marker-end="url(#arrow)"/>
  <path class="edge" d="M157,296 L157,348" marker-end="url(#arrow)"/>
  <path class="edge" d="M470,178 L620,348" marker-end="url(#arrow)"/>
</svg>
