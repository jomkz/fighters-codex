<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" font-family="-apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="IP.EXE: an MFC tool that profiles the machine (CD-ROM benchmark, hardware detection, network config) and faxes/e-mails a system-config report to EA tech support.">
  <style>
    :root { color-scheme: light dark; }
    .box{fill:#f4f6f8;stroke:#5b6b7a;stroke-width:1.5;} .setup{fill:#e8f0fb;stroke:#3d6aa8;stroke-width:1.5;}
    .run{fill:#eaf4ec;stroke:#3f7d4f;stroke-width:1.5;} .dec{fill:#fdf4e3;stroke:#b8892f;stroke-width:1.5;} .ext{fill:#f0eef6;stroke:#6f5b9a;stroke-width:1.5;}
    .lbl{fill:#22303c;font-size:13.5px;} .sub{fill:#4a5a67;font-size:11px;} .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;}
    .title{fill:#33424e;font-size:12px;font-weight:600;letter-spacing:.05em;} .edge{fill:none;stroke:#5b6b7a;stroke-width:1.6;} .el{fill:#4a5a67;font-size:11px;}
    @media (prefers-color-scheme: dark){
      .box{fill:#232a31;stroke:#7f8f9d;} .setup{fill:#1e2c3e;stroke:#6f9bd6;} .run{fill:#1d2c22;stroke:#6fae7f;} .dec{fill:#322a1a;stroke:#d9b45f;} .ext{fill:#282436;stroke:#9a86c7;}
      .lbl{fill:#dce4ea;} .sub{fill:#a6b3bd;} .title{fill:#c7d2da;} .edge{stroke:#8a99a5;} .el{fill:#a6b3bd;}
    }
    :root[data-theme="dark"] .box{fill:#232a31;stroke:#7f8f9d;} :root[data-theme="dark"] .setup{fill:#1e2c3e;stroke:#6f9bd6;}
    :root[data-theme="dark"] .run{fill:#1d2c22;stroke:#6fae7f;} :root[data-theme="dark"] .dec{fill:#322a1a;stroke:#d9b45f;} :root[data-theme="dark"] .ext{fill:#282436;stroke:#9a86c7;}
    :root[data-theme="dark"] .lbl{fill:#dce4ea;} :root[data-theme="dark"] .sub{fill:#a6b3bd;} :root[data-theme="dark"] .title{fill:#c7d2da;} :root[data-theme="dark"] .edge{stroke:#8a99a5;} :root[data-theme="dark"] .el{fill:#a6b3bd;}
    :root[data-theme="light"] .box{fill:#f4f6f8;stroke:#5b6b7a;} :root[data-theme="light"] .setup{fill:#e8f0fb;stroke:#3d6aa8;}
    :root[data-theme="light"] .run{fill:#eaf4ec;stroke:#3f7d4f;} :root[data-theme="light"] .dec{fill:#fdf4e3;stroke:#b8892f;} :root[data-theme="light"] .ext{fill:#f0eef6;stroke:#6f5b9a;}
    :root[data-theme="light"] .lbl{fill:#22303c;} :root[data-theme="light"] .sub{fill:#4a5a67;} :root[data-theme="light"] .title{fill:#33424e;} :root[data-theme="light"] .edge{stroke:#5b6b7a;} :root[data-theme="light"] .el{fill:#4a5a67;}
  </style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="edge" stroke="none" fill="context-stroke"/></marker></defs>
  <text x="410" y="22" text-anchor="middle" class="title">IP.EXE — EA system-info &amp; tech-support tool (MFC)</text>

  <rect class="setup" x="300" y="40" width="220" height="46" rx="6"/>
  <text x="410" y="60" text-anchor="middle" class="lbl mono">_WinMain → AfxWinMain</text>
  <text x="410" y="77" text-anchor="middle" class="sub">MFC application (statically linked)</text>

  <path class="edge" d="M410,86 L410,116" marker-end="url(#arrow)"/>

  <rect class="run" x="60" y="116" width="220" height="64" rx="6"/>
  <text x="170" y="138" text-anchor="middle" class="lbl mono">CDROMBenchmark</text>
  <text x="170" y="156" text-anchor="middle" class="sub">CD-ROM speed / transfer-rate</text>
  <text x="170" y="171" text-anchor="middle" class="sub">Single/Double/Quad-Speed</text>

  <rect class="run" x="300" y="116" width="220" height="64" rx="6"/>
  <text x="410" y="138" text-anchor="middle" class="lbl mono">LoadDetectionDlls</text>
  <text x="410" y="156" text-anchor="middle" class="sub">hdd.dll · cd.dll · sysdm.cpl</text>
  <text x="410" y="171" text-anchor="middle" class="sub">CPU/video/sound/modem/net probe</text>

  <rect class="run" x="540" y="116" width="220" height="64" rx="6"/>
  <text x="650" y="138" text-anchor="middle" class="lbl mono">DirectPlay / Winsock</text>
  <text x="650" y="156" text-anchor="middle" class="sub">version + IP config report</text>
  <text x="650" y="171" text-anchor="middle" class="sub">(diagnostics, not transport)</text>

  <path class="edge" d="M410,180 L410,210" marker-end="url(#arrow)"/>

  <rect class="dec" x="270" y="210" width="280" height="52" rx="6"/>
  <text x="410" y="232" text-anchor="middle" class="lbl mono">BuildSupportReport</text>
  <text x="410" y="249" text-anchor="middle" class="sub">[CPU]/[VIDEO]/[SOUND]/[MODEM] config</text>

  <path class="edge" d="M410,262 L410,290" marker-end="url(#arrow)"/>
  <rect class="ext" x="270" y="290" width="280" height="40" rx="6"/>
  <text x="410" y="314" text-anchor="middle" class="lbl">fax / e-mail → EA Tech Support (MAPI)</text>
</svg>
