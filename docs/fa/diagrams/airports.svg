<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 288" font-family="-apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="Airports: the AP registry keys airports by object id; APNearest and APTakeoff/LandingType feed the ground state machine, APApproachPath the final approach, and APCheckCarrier attaches a parked aircraft to a moving carrier deck. This drives the STRIPProc and CARRIERProc object classes.">
  <style>
    :root { color-scheme: light dark; }
    .box{fill:#f4f6f8;stroke:#5b6b7a;stroke-width:1.5;} .rcs{fill:#e8f0fb;stroke:#3d6aa8;stroke-width:1.5;}
    .gate{fill:#fdf4e3;stroke:#b8892f;stroke-width:1.5;} .buf{fill:#eaf4ec;stroke:#3f7d4f;stroke-width:1.5;} .out{fill:#fbecea;stroke:#b25548;stroke-width:1.5;}
    .lbl{fill:#22303c;font-size:13.5px;} .sub{fill:#4a5a67;font-size:11px;} .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;}
    .title{fill:#33424e;font-size:12px;font-weight:600;letter-spacing:.05em;} .edge{fill:none;stroke:#5b6b7a;stroke-width:1.6;} .el{fill:#4a5a67;font-size:10.5px;}
    @media (prefers-color-scheme: dark){
      .box{fill:#232a31;stroke:#7f8f9d;} .rcs{fill:#1e2c3e;stroke:#6f9bd6;} .gate{fill:#322a1a;stroke:#d9b45f;} .buf{fill:#1d2c22;stroke:#6fae7f;} .out{fill:#33221f;stroke:#d98a7c;}
      .lbl{fill:#dce4ea;} .sub{fill:#a6b3bd;} .title{fill:#c7d2da;} .edge{stroke:#8a99a5;} .el{fill:#a6b3bd;}
    }
    :root[data-theme="dark"] .box{fill:#232a31;stroke:#7f8f9d;} :root[data-theme="dark"] .rcs{fill:#1e2c3e;stroke:#6f9bd6;}
    :root[data-theme="dark"] .gate{fill:#322a1a;stroke:#d9b45f;} :root[data-theme="dark"] .buf{fill:#1d2c22;stroke:#6fae7f;} :root[data-theme="dark"] .out{fill:#33221f;stroke:#d98a7c;}
    :root[data-theme="dark"] .lbl{fill:#dce4ea;} :root[data-theme="dark"] .sub{fill:#a6b3bd;} :root[data-theme="dark"] .title{fill:#c7d2da;} :root[data-theme="dark"] .edge{stroke:#8a99a5;} :root[data-theme="dark"] .el{fill:#a6b3bd;}
    :root[data-theme="light"] .box{fill:#f4f6f8;stroke:#5b6b7a;} :root[data-theme="light"] .rcs{fill:#e8f0fb;stroke:#3d6aa8;}
    :root[data-theme="light"] .gate{fill:#fdf4e3;stroke:#b8892f;} :root[data-theme="light"] .buf{fill:#eaf4ec;stroke:#3f7d4f;} :root[data-theme="light"] .out{fill:#fbecea;stroke:#b25548;}
    :root[data-theme="light"] .lbl{fill:#22303c;} :root[data-theme="light"] .sub{fill:#4a5a67;} :root[data-theme="light"] .title{fill:#33424e;} :root[data-theme="light"] .edge{stroke:#5b6b7a;} :root[data-theme="light"] .el{fill:#4a5a67;}
  </style>
  <defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" class="el" stroke="none"/></marker></defs>
  <text x="16" y="24" class="title">AIRPORTS &amp; CARRIERS — registry to ground state</text>
  <rect x="16" y="104" width="132" height="72" rx="6" class="buf"/>
  <text x="82" y="128" text-anchor="middle" class="lbl">AP registry</text>
  <text x="82" y="146" text-anchor="middle" class="sub">0x28 AIRPORTs</text>
  <text x="82" y="161" text-anchor="middle" class="sub mono">APAdd / APFind</text>
  <rect x="196" y="60" width="150" height="60" rx="6" class="rcs"/>
  <text x="271" y="84" text-anchor="middle" class="lbl mono">APNearest</text>
  <text x="271" y="102" text-anchor="middle" class="sub">side + landable</text>
  <rect x="196" y="150" width="150" height="72" rx="6" class="gate"/>
  <text x="271" y="174" text-anchor="middle" class="lbl mono">APTakeoff /</text>
  <text x="271" y="191" text-anchor="middle" class="lbl mono">APLandingType</text>
  <text x="271" y="208" text-anchor="middle" class="sub">VTOL/cat/deck/runway</text>
  <rect x="398" y="150" width="152" height="72" rx="6" class="out"/>
  <text x="474" y="174" text-anchor="middle" class="lbl">ground state</text>
  <text x="474" y="192" text-anchor="middle" class="sub">PlayerUpdateState</text>
  <text x="474" y="207" text-anchor="middle" class="sub">(input.md, #492)</text>
  <rect x="398" y="52" width="152" height="72" rx="6" class="box"/>
  <text x="474" y="76" text-anchor="middle" class="lbl mono">APApproachPath</text>
  <text x="474" y="94" text-anchor="middle" class="sub">glideslope steering</text>
  <text x="474" y="109" text-anchor="middle" class="sub mono">APHomeAirport</text>
  <rect x="600" y="100" width="146" height="72" rx="6" class="gate"/>
  <text x="673" y="124" text-anchor="middle" class="lbl mono">APCheckCarrier</text>
  <text x="673" y="142" text-anchor="middle" class="sub">attach to moving</text>
  <text x="673" y="157" text-anchor="middle" class="sub">carrier deck</text>
  <path d="M148 128 C172 128 172 90 194 90" class="edge" marker-end="url(#a)"/>
  <path d="M148 152 C172 152 172 186 194 186" class="edge" marker-end="url(#a)"/>
  <path d="M346 186 H396" class="edge" marker-end="url(#a)"/>
  <path d="M346 90 H396" class="edge" marker-end="url(#a)"/>
  <path d="M550 160 C574 160 578 136 598 136" class="edge" marker-end="url(#a)"/>
  <text x="16" y="266" class="el">drives the <tspan class="mono">_STRIPProc</tspan> / <tspan class="mono">_CARRIERProc</tspan> object classes (objects.md)</text>
</svg>
