# Documentation site for the fighters-codex docs tree (docs/).
# Built strictly in CI (.github/workflows/docs.yml) and deployed to GitHub Pages
# on push to main. Local preview: see docs/development.md § Documentation site.
site_name: Fighters Codex
site_description: >-
  Reverse-engineering documentation for Jane's Fighters Anthology (1998) —
  format specifications, engine architecture notes, and modding guides,
  validated by byte-identical codecs.
site_url: https://jomkz.github.io/fighters-codex/
repo_url: https://github.com/jomkz/fighters-codex
repo_name: jomkz/fighters-codex
edit_uri: edit/main/docs/
copyright: >-
  MIT licensed. The formats documented here were determined independently by
  reverse engineering for interoperability. Jane's Fighters Anthology and
  related titles are trademarks of their respective owners; no copyrighted
  game content is included.

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono
  # Custom palette (#343): slate/navy primary with an amber/orange accent —
  # colors are defined in docs/assets/extra.css under `custom`. Three-state
  # toggle: auto (system) -> light -> dark.
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tabs.link
    - content.action.edit

extra_css:
  - assets/extra.css

# Print/PDF export (#343): print-site concatenates every page into a single
# /print_page/ for browser print-to-PDF. Must stay the LAST plugin listed.
plugins:
  - search
  - print-site:
      add_to_navigation: true
      print_page_title: "Print / PDF"
      add_cover_page: true
      add_table_of_contents: true
      toc_depth: 2
      add_full_urls: true
      enumerate_headings: false

markdown_extensions:
  - admonition
  # GitHub-compatible heading slugs so #anchor links work identically on
  # GitHub and the site (e.g. em-dash headings slug to double hyphens).
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower

# Broken links, broken anchors, or a page missing from nav fail the strict
# CI build — docs claims stay mechanically checked.
validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn

